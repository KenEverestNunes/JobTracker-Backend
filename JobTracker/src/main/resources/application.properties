# Database config (uses env vars on Tux, falls back to localhost for local dev)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobtracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Use a custom port for Tux
server.port=9482

# JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
